<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - Alpha Marketing</title>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn:hover { transform: translateY(-2px); }

    .btn-refresh {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-logout {
      background: rgba(255,255,255,0.1);
      color: white;
      margin-left: 10px;
    }
    .btn-logout:hover { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px 30px;
      backdrop-filter: blur(10px);
      text-align: center;
      flex: 1;
      transition: all 0.3s;
    }

    .stat-card:hover { border-color: #667eea; box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2); transform: translateY(-5px); }

    .stat-card h2 { font-size: 2rem; color: #667eea; }
    .stat-card p { font-size: 0.85rem; color: #aaa; margin-top: 4px; }

    .section-title {
      font-size: 1.2rem;
      margin-bottom: 15px;
      color: #ccc;
      border-left: 3px solid #667eea;
      padding-left: 10px;
    }

    .table-wrapper {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: auto;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: rgba(102,126,234,0.2);
      padding: 14px 16px;
      text-align: left;
      font-size: 0.85rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 14px 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 0.9rem;
      transition: background 0.3s;
    }

    tr:hover td { background: rgba(255,255,255,0.08); }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .badge-pending  { background: rgba(255,200,0,0.15); color: #ffc800; border: 1px solid rgba(255, 200, 0, 0.3); }
    .badge-diproses { background: rgba(102,126,234,0.15); color: #667eea; border: 1px solid rgba(102, 126, 234, 0.3); }
    .badge-selesai  { background: rgba(0,200,100,0.15); color: #00c864; border: 1px solid rgba(0, 200, 100, 0.3); }

    select.status-select {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.3s;
    }
    
    select.status-select:focus { border-color: #667eea; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #555;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
    }
  </style>
</head>
<body>

<div class="header" data-aos="fade-down" data-aos-duration="800">
  <h1>⚡ Alpha Marketing — Admin Dashboard</h1>
  <div>
    <button class="btn btn-refresh" onclick="loadAll()">🔄 Refresh Data</button>
    <button class="btn btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- Statistik -->
<div class="stats">
  <div class="stat-card" data-aos="zoom-in" data-aos-delay="100">
    <h2 id="totalOrders">-</h2>
    <p>Total Pesanan</p>
  </div>
  <div class="stat-card" data-aos="zoom-in" data-aos-delay="200">
    <h2 id="totalPending">-</h2>
    <p>Pending</p>
  </div>
  <div class="stat-card" data-aos="zoom-in" data-aos-delay="300">
    <h2 id="totalSelesai">-</h2>
    <p>Selesai</p>
  </div>
  <div class="stat-card" data-aos="zoom-in" data-aos-delay="400">
    <h2 id="totalContacts">-</h2>
    <p>Pesan Masuk</p>
  </div>
</div>

<!-- Tabel Orders -->
<div data-aos="fade-up" data-aos-delay="200">
    <p class="section-title">📋 Data Pemesanan</p>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Nama</th>
            <th>Email</th>
            <th>WhatsApp</th>
            <th>Paket</th>
            <th>Status</th>
            <th>Tanggal</th>
            <th>Aksi Status</th>
          </tr>
        </thead>
        <tbody id="ordersTable">
          <tr><td colspan="8" class="loading">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
</div>

<!-- Tabel Contacts -->
<div data-aos="fade-up" data-aos-delay="400">
    <p class="section-title">💬 Pesan Masuk (Hubungi Kami)</p>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>No</th>
            <th>Nama</th>
            <th>Email</th>
            <th>WhatsApp</th>
            <th>Pesan</th>
            <th>Tanggal</th>
          </tr>
        </thead>
        <tbody id="contactsTable">
          <tr><td colspan="6" class="loading">Memuat data...</td></tr>
        </tbody>
      </table>
    </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({ once: true });

  // Proteksi password sederhana
  const PASSWORD = 'admin';
  const isAuth = sessionStorage.getItem('adminAuth');

  if (!isAuth) {
    const input = prompt('Masukkan password admin:');
    if (input !== PASSWORD) {
      alert('Password salah! Akses ditolak.');
      window.location.href = 'login.html';
    } else {
      sessionStorage.setItem('adminAuth', 'true');
    }
  }

  function formatTanggal(str) {
    const d = new Date(str);
    return d.toLocaleDateString('id-ID', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function formatWa(no) {
    if(!no || no === '-') return '';
    let f = no.toString().replace(/\D/g, '');
    if(f.startsWith('0')) f = '62' + f.substring(1);
    return f;
  }

  function badgeHTML(status) {
    const cls = status === 'pending' ? 'badge-pending'
              : status === 'diproses' ? 'badge-diproses'
              : 'badge-selesai';
    return `<span class="badge ${cls}">${status}</span>`;
  }

  async function updateStatus(id, newStatus) {
    await fetch(`/api/orders/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    loadAll();
  }

  async function loadOrders() {
    const res = await fetch('/api/orders');
    const data = await res.json();
    const tbody = document.getElementById('ordersTable');

    document.getElementById('totalOrders').textContent = data.length;
    document.getElementById('totalPending').textContent = data.filter(d => d.status === 'pending').length;
    document.getElementById('totalSelesai').textContent = data.filter(d => d.status === 'selesai').length;

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-state">Belum ada pesanan masuk.</td></tr>`;
      return;
    }

    // Urutkan: pisahkan yang 'selesai' agar selalu tampil di urutan terbawah
    const sortedData = data.sort((a, b) => {
      if (a.status === 'selesai' && b.status !== 'selesai') return 1;
      if (a.status !== 'selesai' && b.status === 'selesai') return -1;
      return 0; // Selebihnya percayakan pada urutan tanggal dari backend
    });

    tbody.innerHTML = sortedData.map((d, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${d.nama}</td>
        <td>${d.email}</td>
        <td>
          <a href="https://wa.me/${formatWa(d.whatsapp)}" target="_blank" style="color:#00c864; text-decoration:none; font-weight:600;">
            💬 ${d.whatsapp || '-'}
          </a>
        </td>
        <td>${d.paket}</td>
        <td>${badgeHTML(d.status)}</td>
        <td>${formatTanggal(d.created_at)}</td>
        <td>
          <select class="status-select" onchange="updateStatus(${d.id}, this.value)">
            <option ${d.status === 'pending'   ? 'selected' : ''}>pending</option>
            <option ${d.status === 'diproses'  ? 'selected' : ''}>diproses</option>
            <option ${d.status === 'selesai'   ? 'selected' : ''}>selesai</option>
          </select>
        </td>
      </tr>
    `).join('');
  }

  async function loadContacts() {
    const res = await fetch('/api/contacts');
    const data = await res.json();
    const tbody = document.getElementById('contactsTable');

    document.getElementById('totalContacts').textContent = data.length;

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="empty-state">Belum ada pesan masuk.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map((d, i) => `
      <tr>
        <td>${i + 1}</td>
        <td>${d.nama}</td>
        <td>${d.email}</td>
        <td>
          <a href="https://wa.me/${formatWa(d.whatsapp)}" target="_blank" style="color:#00c864; text-decoration:none; font-weight:600;">
            💬 ${d.whatsapp || '-'}
          </a>
        </td>
        <td>${d.pesan}</td>
        <td>${formatTanggal(d.created_at)}</td>
      </tr>
    `).join('');
  }

  function loadAll() {
    loadOrders();
    loadContacts();
  }

  function logout() {
    sessionStorage.removeItem('adminAuth');
    window.location.href = 'login.html';
  }

  // Load data saat halaman dibuka
  loadAll();
</script>
</body>
</html>
