version: '3.8'

services:
  # Aplikasi Node.js Web
  web:
    build: .
    container_name: alpha-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - minio
    restart: always

  # Database PostgreSQL Lokal
  postgres:
    image: postgres:15
    container_name: alpha-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: salesmarketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Penyimpanan File Lokal (MinIO)
  minio:
    image: minio/minio:latest
    container_name: alpha-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # Port API MinIO
      - "9001:9001"   # Port Web Console MinIO
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
